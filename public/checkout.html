<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHECKOUT | SHOPHUB</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .brutalist-input {
      width: 100%;
      background: #000;
      border: 2px solid var(--border-color);
      color: #fff;
      padding: 1.2rem;
      font-family: var(--font-mono);
      font-size: 1rem;
      text-transform: uppercase;
      outline: none;
      transition: border-color var(--transition-base);
    }
    .brutalist-input:focus {
      border-color: var(--accent);
    }
    .brutalist-label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .form-group {
      margin-bottom: 2rem;
    }
    .checkout-sidebar {
      background: var(--accent);
      color: #000;
      padding: 2.5rem;
      border: 2px solid #000;
    }
  </style>
</head>
<body>

  <div class="marquee-container">
    <div class="marquee-content">
      SECURE CHECKOUT • NO CORPORATE BS • SECURE CHECKOUT • NO CORPORATE BS • SECURE CHECKOUT • NO CORPORATE BS • 
    </div>
  </div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">SHOPHUB</a>
    </div>
  </nav>

  <main style="padding: 4rem 0;">
    <div class="container" style="max-width: 1200px;">
      <h1 class="section-title" style="margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem;">CHECKOUT</h1>
      
      <div style="display: grid; grid-template-columns: 1fr 380px; gap: 3rem; align-items: start;">
        
        <form id="checkoutForm" style="background: var(--bg-surface); border: 2px solid var(--border-color); padding: 3rem;">
          
          <h2 style="font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px;">Shipping Info</h2>
          
          <div class="form-group">
            <label class="brutalist-label">Street Address</label>
            <input type="text" id="street" class="brutalist-input" placeholder="24, Brindabon Bose Lane" required>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label class="brutalist-label">City</label>
              <input type="text" id="city" class="brutalist-input" placeholder="Kolkata" required>
            </div>
            <div class="form-group">
              <label class="brutalist-label">State / Province</label>
              <input type="text" id="state" class="brutalist-input" placeholder="West Bengal" required>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label class="brutalist-label">Zip / Postal Code</label>
              <input type="text" id="zipCode" class="brutalist-input" placeholder="700006" required>
            </div>
            <div class="form-group">
              <label class="brutalist-label">Country</label>
              <input type="text" id="country" class="brutalist-input" value="INDIA" required>
            </div>
          </div>

          <h2 style="font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 2rem; margin-top: 2rem; border-top: 2px solid var(--border-color); padding-top: 2rem; text-transform: uppercase; letter-spacing: 1px;">Payment Method</h2>
          
          <div class="form-group">
            <select id="paymentMethod" class="brutalist-input" style="cursor: pointer;">
              <option value="credit_card">CREDIT / DEBIT CARD</option>
              <option value="upi">UPI</option>
              <option value="cod">CASH ON DELIVERY</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="margin-top: 1rem; font-size: 1.2rem; padding: 1.5rem; width: 100%;">PLACE ORDER [ EXECUTE ]</button>
        </form>
        
        <aside class="checkout-sidebar">
          <h3 style="font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px;">Transaction</h3>
          
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: bold; font-size: 1.1rem;">
            <span>TOTAL ITEMS</span>
            <span id="summaryItems">0</span>
          </div>
          
          <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid #000; font-size: 1.6rem; font-weight: bold;">
            <span>TOTAL DUE</span>
            <span id="summaryTotal">Rs 0</span>
          </div>
        </aside>

      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopHub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">🛒 ShopHub</div>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li id="auth-menu">
          <a href="login.html">Login</a>
        </li>
        <li id="admin-menu" style="display: none;">
          <a href="admin.html">Admin Panel</a>
        </li>
        <li id="profile-menu" style="display: none;">
          <a href="profile.html">Profile</a>
          <a href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <section class="checkout-section">
    <div class="container">
      <h1>Checkout</h1>
      
      <div class="checkout-form">
        <form id="checkoutForm">
          <div class="form-section">
            <h2>Shipping Address</h2>
            <input type="text" id="street" placeholder="Street Address" required>
            <input type="text" id="city" placeholder="City" required>
            <input type="text" id="state" placeholder="State" required>
            <input type="text" id="zipCode" placeholder="Zip Code" required>
            <input type="text" id="country" placeholder="Country" required>
          </div>

          <div class="form-section">
            <h2>Payment Method</h2>
            <select id="paymentMethod" required>
              <option value="credit_card">Credit Card</option>
              <option value="debit_card">Debit Card</option>
              <option value="paypal">PayPal</option>
            </select>
          </div>

          <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="orderItems"></div>
            <div class="summary-row total">
              <span>Total:</span>
              <span id="orderTotal">$0.00</span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px;">Place Order</button>
        </form>
      </div>
    </div>
  </section>

  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>

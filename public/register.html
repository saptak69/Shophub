<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPERATIVE INITIATION | SHOPHUB</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .register-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 4rem 2rem;
    }
    .register-panel {
      background: var(--bg-surface);
      border: 2px solid var(--border-color);
      padding: 4rem 3rem;
      width: 100%;
      max-width: 550px;
      position: relative;
      box-shadow: 10px 10px 0px #000;
    }
    .register-badge {
      position: absolute;
      top: -15px;
      left: 2rem;
      background: var(--accent);
      color: #000;
      padding: 0.3rem 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      border: 2px solid #000;
    }
    .register-title {
      font-family: var(--font-display);
      font-size: 3.5rem;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    .register-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .auth-link {
      display: block;
      margin-top: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      text-align: center;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color var(--transition-base);
    }
    .auth-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="marquee-container">
    <div class="marquee-content">
      NEW OPERATIVE REGISTRATION • JOIN THE SYNDICATE • NEW OPERATIVE REGISTRATION • JOIN THE SYNDICATE • 
    </div>
  </div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="assets/logo-mark.svg" alt="ShopHub Logo" class="brand-logo">
        <span class="brand-wordmark">SHOPHUB</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html">Drops</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </div>
  </nav>

  <main class="register-wrapper">
    <div class="register-panel">
      <div class="register-badge">New Clearance</div>
      <h1 class="register-title">JOIN THE SYNDICATE</h1>
      <p class="register-subtitle">Establish your operative profile to access premium drops.</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label class="brutalist-label">Operative Name</label>
          <input type="text" id="name" class="brutalist-input" placeholder="Identify Yourself" required>
        </div>
        
        <div class="form-group">
          <label class="brutalist-label">Secure Email</label>
          <input type="email" id="email" class="brutalist-input" placeholder="operative@shophub.com" required>
        </div>
        
        <div class="form-group">
          <label class="brutalist-label">Passphrase</label>
          <input type="password" id="password" class="brutalist-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; font-size: 1.2rem; padding: 1.2rem; width: 100%;">INITIALIZE [ EXECUTE ]</button>
      </form>

      <a href="login.html" class="auth-link">Already authorized? [ Access Terminal ]</a>
      
      <div id="registerError" style="color: #ff3333; margin-top: 1rem; text-align: center; display: none; font-weight: bold; text-transform: uppercase; font-size: 0.85rem;"></div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

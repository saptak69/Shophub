<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Bag | ShopHub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">ShopHub</a>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html" class="active">Cart <span class="cart-count">0</span></a></li>
        <li id="auth-menu"><a href="login.html">Login</a></li>
        <li id="admin-menu" style="display: none;"><a href="admin.html">Admin</a></li>
        <li id="profile-menu" style="display: none;">
          <a href="profile.html">Profile</a>
          <a href="#" onclick="logout()" style="margin-left: 1rem;">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="cart-section">
    <div class="container">
      <h1 style="margin-bottom: 2rem; font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;">Your Bag</h1>
      
      <div class="cart-content">
        <div class="cart-items" id="cartItems">
          </div>

        <div class="cart-summary">
          <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">Order Summary</h2>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Estimated Shipping</span>
            <span id="shipping">Free</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>
          <a href="checkout.html" class="btn btn-primary" style="width: 100%; text-align: center; display: block; margin-top: 1.5rem;">Secure Checkout</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOUR BAG | SHOPHUB</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="marquee-container">
    <div class="marquee-content">
      SECURE CHECKOUT • NO CORPORATE BS • SECURE CHECKOUT • NO CORPORATE BS • SECURE CHECKOUT • NO CORPORATE BS • 
    </div>
  </div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="assets/logo-mark.svg" alt="ShopHub S sigil">
        <span class="brand-wordmark">SHOPHUB</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html">Drops</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="cart.html" class="active">Cart <span class="cart-count">0</span></a></li>
        <li id="auth-menu"><a href="login.html">Login</a></li>
        <li id="profile-menu" style="display: none;">
          <a href="profile.html">Profile</a>
          <a href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <main style="padding: 4rem 0;">
    <div class="container">
      <h1 class="section-title" style="margin-bottom: 2rem;">YOUR BAG</h1>
      
      <div style="display: grid; grid-template-columns: 1fr 350px; gap: 3rem; align-items: start;">
        <div id="cartItems"></div>
        
        <div style="background: var(--bg-surface); border: 1px solid var(--border-color); padding: 2rem; position: sticky; top: 100px;">
          <h2 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 1.5rem; text-transform: uppercase;">Summary</h2>
          
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--text-muted);">
            <span>SUBTOTAL</span>
            <span id="subtotal" style="color: #fff; font-weight: bold;">Rs 0</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--text-muted);">
            <span>SHIPPING</span>
            <span style="color: var(--accent); font-weight: bold;">FREE</span>
          </div>
          
          <div style="display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); font-size: 1.5rem; font-weight: bold;">
            <span>TOTAL</span>
            <span id="total" style="color: var(--accent);">Rs 0</span>
          </div>
          
          <a href="checkout.html" class="btn btn-primary" style="margin-top: 2rem; display: flex;">PROCEED TO SECURE CHECKOUT</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ShopHub</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">🛒 ShopHub</div>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li id="admin-menu">
          <a href="admin.html" class="active">Admin Panel</a>
        </li>
        <li id="profile-menu">
          <a href="profile.html">Profile</a>
          <a href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <section class="admin-section">
    <div class="admin-container">
      <div class="admin-sidebar">
        <ul>
          <li><a href="#" onclick="showSection('products')">Products</a></li>
          <li><a href="#" onclick="showSection('orders')">Orders</a></li>
        </ul>
      </div>

      <div class="admin-content">
        <div id="products-section" class="admin-section-content">
          <h2>Manage Products</h2>
          
          <div class="form-section">
            <h3>Add New Product</h3>
            <form id="productForm">
              <input type="text" id="productName" placeholder="Product Name" required>
              <input type="text" id="productDescription" placeholder="Description" required>
              <input type="number" id="productPrice" placeholder="Price" required>
              <input type="number" id="productStock" placeholder="Stock" required>
              <input type="text" id="productCategory" placeholder="Category" required>
              <input type="text" id="productImage" placeholder="Image URL" required>
              <button type="submit" class="btn btn-primary">Add Product</button>
            </form>
          </div>

          <div class="products-table">
            <h3>Products List</h3>
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Category</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productsTableBody">
                <!-- Products will be loaded here -->
              </tbody>
            </table>
          </div>
        </div>

        <div id="orders-section" class="admin-section-content" style="display: none;">
          <h2>Manage Orders</h2>
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody">
              <!-- Orders will be loaded here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
